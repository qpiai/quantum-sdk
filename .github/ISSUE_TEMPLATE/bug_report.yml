name: Bug Report
description: File a bug report to help us improve the SDK
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue...
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: e.g. 3.10.8
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Ubuntu 22.04, Windows 11, macOS 14
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      placeholder: e.g. 0.1.42
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Code to Reproduce
      description: Please provide a minimal code example to reproduce the issue.
      placeholder: |
        from qpiai_quantum import Circuit
        # ...
      render: python
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Error Message & Traceback
      description: Include the full traceback if available.
      placeholder: Traceback (most recent call) ...
      render: shell
  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs. Actual Behavior
      description: What did you expect to happen and what actually happened?
